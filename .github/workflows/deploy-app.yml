name: Deploy Django LMS APP

on:
    workflow_dispatch:
jobs:        
    deploy:
        env:
           DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
           DOCKER_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD}}

        runs-on: self-hosted

        steps:
        - name: checkout code
          uses: actions/checkout@v4
       
        - name: Set up Docker Compose (optional, usually pre-installed on ubuntu-latest runners)
          uses: docker/setup-compose-action@v2 

        - name: Deploy with docker compose
          run: |
            pwd
            ls -R
            cd Lms-Rcmoocs
            docker compose down
            docker compose up -d --build --force-recreate
            
