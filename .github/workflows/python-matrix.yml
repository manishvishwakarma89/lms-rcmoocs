name: Python Matrix Testing

on:
  push:
    branches: [ main, master, feat/dev ]
  pull_request:
    branches: [ main, master,feat/dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # Maximize coverage: tests run in parallel for every combination
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        django-version: ["4.2", "5.0", "5.1"]
      # fail-fast: false means if 3.11 fails, 3.12 will still finish
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Force the specific Django version from the matrix
          pip install "django~=${{ matrix.django-version }}.0" 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Django Tests
        env:
          SECRET_KEY: "matrix-testing-key"
        run: |
          python manage.py test
