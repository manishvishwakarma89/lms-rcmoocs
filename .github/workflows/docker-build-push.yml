name: Build and Push Docker Image

on:
    push:
      branches: [ main, master, feat/dev ]
    pull_request:
      branches: [ main, master,feat/dev ]
    workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract branch name
        run: echo "BRANCH_NAME=${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Build and push 
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile # Optional if named "Dockerfile" and in root
          push: true
          tags: |
               ${{ secrets.DOCKER_USERNAME }}/lms-rcmoocs:${{ env.BRANCH_NAME }}
               ${{ secrets.DOCKER_USERNAME }}/lms-rcmoocs:${{ github.sha }}
               ${{ secrets.DOCKER_USERNAME }}/lms-rcmoocs:latest

